<h2>Register</h2>

<form (ngSubmit)="register()">
  <input type="text" [(ngModel)]="firstName" name="firstName" placeholder="First Name" required>
  <input type="text" [(ngModel)]="lastName" name="lastName" placeholder="Last Name" required>
  <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required>
  <input type="date" [(ngModel)]="birthDate" name="birthDate" required>
  <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required>
  <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>

  <button type="submit">Register</button>
</form>

<a routerLink="/login">Already have an account</a>
